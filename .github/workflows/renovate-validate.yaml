name: renovate-validate

on:
  pull_request:
    paths:
      - renovate.json
      - .github/renovate.json5

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate renovate config
        uses: suzuki-shunsuke/validate-renovate-config-action@v0
