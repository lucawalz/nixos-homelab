# SOPS configuration for encrypting K8s secrets

keys:
  # Your age key (generate with: age-keygen -o ~/.config/sops/age/keys.txt)
  - &admin_lucawalz age1t3ce6qjhjffvdamzmdhp50tnfnkyw0ytmzkw0s844vfdmystcp2qfvdem9

  # Master node key
  - &master age16s0zny37a6hm00kefeq3q9swjw0prd0urzctzpsq2wqznxxpkpesukfd4x

creation_rules:
  # New Kubernetes secrets structure
  - path_regex: kubernetes/.*/.*secret.*\.yaml$
    key_groups:
      - age:
          - *admin_lucawalz
          - *master

  # Kubernetes encrypted values files
  - path_regex: kubernetes/.*/.*values.*\.enc\.yaml$
    key_groups:
      - age:
          - *admin_lucawalz
          - *master

  # New Cloudflare secrets in kubernetes structure
  - path_regex: kubernetes/.*/cloudflare/.*\.yaml$
    key_groups:
      - age:
          - *admin_lucawalz
          - *master
