apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      initContainers:
      - name: config-reloader
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          TOKEN=$(cat /secrets/gotify-token/token)
          sed "s|GOTIFY_TOKEN_PLACEHOLDER|$TOKEN|g" /config-template/alertmanager.yml > /config/alertmanager.yml
        volumeMounts:
        - name: config-template
          mountPath: /config-template
        - name: config
          mountPath: /config
        - name: gotify-token
          mountPath: /secrets/gotify-token
          readOnly: true
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
        - '--config.file=/etc/alertmanager/alertmanager.yml'
        - '--storage.path=/alertmanager'
        - '--web.external-url=http://localhost:9093'
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: templates
          mountPath: /etc/alertmanager/templates
        - name: storage
          mountPath: /alertmanager
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config-template
        configMap:
          name: alertmanager-config
      - name: config
        emptyDir: {}
      - name: templates
        configMap:
          name: alertmanager-templates
      - name: storage
        emptyDir: {}
      - name: gotify-token
        secret:
          secretName: gotify-token