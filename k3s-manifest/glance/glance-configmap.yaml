apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
  labels:
    app: glance
    component: config
data:
  glance.yml: |
    server:
      host: 0.0.0.0
      port: 8080

    theme:
      # Dark theme configuration using proper HSL format
      background-color: 240 8 9
      primary-color: 43 50 70
      positive-color: 120 60 50
      negative-color: 0 70 70
      contrast-multiplier: 1.2

    pages:
      - name: Home
        columns:
          # Left Column (25% width) - Calendar, RSS Feed, Clock, Markets
          - size: small
            widgets:
              - type: calendar
                first-day-of-week: monday
                
              - type: rss
                title: RSS Feed
                style: vertical-list
                collapse-after: 5
                cache: 1h
                feeds:
                  - url: https://kubernetes.io/feed.xml
                    title: Kubernetes Blog
                  - url: https://nixos.org/blog/announcements-rss.xml
                    title: NixOS News
                  - url: https://www.docker.com/blog/feed/
                    title: Docker Blog
                  - url: https://www.cncf.io/feed/
                    title: CNCF News
                
              - type: markets
                sort-by: change
                markets:
                  - symbol: IBM
                    name: IBM
                  - symbol: GOOGL
                    name: Alphabet
                  - symbol: META
                    name: Meta
                  - symbol: MSFT
                    name: Microsoft
                  - symbol: NVDA
                    name: NVIDIA
                  - symbol: AAPL
                    name: Apple
                    
          # Center Column (50% width) - Grouped News, Videos, Reddit Communities
          - size: full
            widgets:
              # Grouped News (Hacker News + Heise Developer)
              - type: group
                title: Tech News
                widgets:
                  - type: hacker-news
                    title: Hacker News
                    limit: 15
                    collapse-after: 8
                  - type: rss
                    title: Heise Developer
                    style: vertical-list
                    collapse-after: 6
                    cache: 2h
                    feeds:
                      - url: https://www.heise.de/developer/rss/news-atom.xml
                        title: Heise Developer News
                      - url: https://www.heise.de/security/rss/news-atom.xml
                        title: Heise Security
                
              # Videos
              - type: videos
                collapse-after: 6
                channels:
                  - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
                  - UC2eYFnH61tmytImy1mTYvhA # Luke Smith
                  - UCVls1GmFKf6WlTraIb_IaJg # DistroTube
                  - UCkf4VIqu3Acnfzuk3kRIFwA # gotbletu
                
              # More Reddit Communities
              - type: group
                title: Reddit Communities
                widgets:
                  - type: reddit
                    subreddit: programming
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                  - type: reddit
                    subreddit: devops
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                  - type: reddit
                    subreddit: sysadmin
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                  - type: reddit
                    subreddit: selfhosted
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                  - type: reddit
                    subreddit: homelab
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                  - type: reddit
                    subreddit: kubernetes
                    style: vertical-list
                    collapse-after: 4
                    cache: 30m
                    show-thumbnails: true
                
          # Right Column (25% width) - Weather, Clock, Services Uptime, Repository
          - size: small
            widgets:
              - type: weather
                location: Zurich, Switzerland
                units: metric
                hour-format: 24h
                hide-location: false
                show-area-name: true
                
              - type: clock
                hour-format: 24h
                timezones:
                  - timezone: Europe/Zurich
                    label: Local Time
                  - timezone: America/New_York
                    label: New York
                  - timezone: Asia/Tokyo
                    label: Tokyo
                
              - type: monitor
                title: Services
                cache: 1m
                sites:
                  - title: Grafana
                    url: https://grafana.syslabs.dev
                    icon: si:grafana
                  - title: Home Dashboard
                    url: https://home.syslabs.dev
                    icon: si:kubernetes
                    
              - type: repository
                repository: glanceapp/glance
                pull-requests-limit: 3
                issues-limit: 3
