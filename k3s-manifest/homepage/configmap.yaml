apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Luca's Homelab
    favicon: https://github.com/lucawalz.png
    theme: dark
    color: slate
    headerStyle: clean
    target: _blank
    hideVersion: false
    statusStyle: dot
    layout:
      Services:
        style: row
        columns: 3
        header: true
      Infrastructure:
        style: row
        columns: 3
        header: true
    
  services.yaml: |
    - Services:
        - Grafana:
            href: https://grafana.syslabs.dev
            description: Metrics & Dashboards
            icon: grafana.png
            ping: https://grafana.syslabs.dev
            statusStyle: dot
            
        - Prometheus:
            href: http://prometheus.monitoring.svc.cluster.local:9090
            description: Metrics Database
            icon: prometheus.png
            ping: http://prometheus.monitoring.svc.cluster.local:9090
            statusStyle: dot
            
    - Infrastructure:
        - Longhorn:
            href: http://longhorn-frontend.longhorn-system.svc.cluster.local
            description: Block Storage
            icon: longhorn.png
            ping: http://longhorn-frontend.longhorn-system.svc.cluster.local
            statusStyle: dot
            
        - Traefik:
            href: http://traefik.traefik.svc.cluster.local:9000/dashboard/
            description: Ingress Controller
            icon: traefik.png
            statusStyle: dot
            
        - Cloudflare:
            href: https://dash.cloudflare.com
            description: DNS & Tunnels
            icon: cloudflare.png
            statusStyle: dot
            
  bookmarks.yaml: |
    - Development:
        - GitHub:
            - icon: si-github
              href: https://github.com/lucawalz
              abbr: GH
              
        - Homelab Repo:
            - icon: si-github
              href: https://github.com/lucawalz/nixos-homelab
              abbr: HL
              
    - Documentation:
        - NixOS:
            - icon: si-nixos
              href: https://nixos.org/manual/nixos/stable/
              abbr: NX
              
        - K3s:
            - icon: si-kubernetes
              href: https://docs.k3s.io
              abbr: K3
              
  widgets.yaml: |
    - logo:
        icon: https://github.com/lucawalz.png
        
    - greeting:
        text_size: 3xl
        text: "Welcome, Luca"
        
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
          
    - search:
        provider: google
        target: _blank
        
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
          
  docker.yaml: ""
  
  kubernetes.yaml: |
    mode: cluster
    
  custom.css: |
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      background-attachment: fixed;
    }
    
    header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 0 0 1rem 1rem;
      margin-bottom: 1.5rem;
    }
    
    .logo img {
      border-radius: 50%;
      border: 2px solid rgba(99, 102, 241, 0.5);
    }
    
    .widget {
      background: rgba(30, 41, 59, 0.6) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 0.75rem;
      transition: all 0.3s ease;
    }
    
    .widget:hover {
      border-color: rgba(99, 102, 241, 0.4);
    }
    
    .service-card {
      background: rgba(30, 41, 59, 0.6) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 0.75rem;
      transition: all 0.3s ease;
    }
    
    .service-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.4);
    }
    
    .bookmark-group {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    
    .section-header {
      background: rgba(99, 102, 241, 0.15);
      border-left: 3px solid rgb(99, 102, 241);
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-weight: 600;
      color: rgb(226, 232, 240);
    }
    
  custom.js: ""