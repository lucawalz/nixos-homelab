apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Luca's Homelab
    theme: dark
    color: slate
    
  services.yaml: |
    - Monitoring:
        - Grafana:
            href: https://grafana.syslabs.dev
            description: Metrics Dashboard
            
  bookmarks.yaml: |
    - Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/lucawalz
              
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          
    - greeting:
        text: Welcome!
        
  docker.yaml: ""
  
  kubernetes.yaml: |
    mode: cluster
