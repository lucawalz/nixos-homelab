apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "postgres"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: MINIFLUX_DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: MINIFLUX_DB_USER
        - name: MINIFLUX_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: MINIFLUX_DB_PASSWORD
        - name: MINIFLUX_DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: MINIFLUX_DB_NAME
        lifecycle:
          postStart:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  until pg_isready -U postgres; do sleep 1; done
                  psql -U postgres -d ${MINIFLUX_DB_NAME} -c "ALTER EXTENSION hstore OWNER TO ${MINIFLUX_DB_USER};" 2>/dev/null || true
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
      - name: init-scripts
        configMap:
          name: postgres-init-db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP