apiVersion: v1
kind: ConfigMap
metadata:
  name: init-db
  namespace: sentio-systems
data:
  init-sentio-db.sql: |
    -- Create sentio database if it doesn't exist
    SELECT 'CREATE DATABASE sentio'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'sentio')\gexec

    -- Create keycloak database if it doesn't exist  
    SELECT 'CREATE DATABASE keycloak'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec

    -- Grant privileges
    GRANT ALL PRIVILEGES ON DATABASE sentio TO sentio;
    GRANT ALL PRIVILEGES ON DATABASE keycloak TO sentio;
