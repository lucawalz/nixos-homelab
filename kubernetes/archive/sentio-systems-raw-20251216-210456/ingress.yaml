---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentio-systems
  namespace: sentio-systems
spec:
  entryPoints:
    - web
  routes:
    # Frontend - root path
    - match: Host(`sentio.syslabs.dev`) && !PathPrefix(`/api`) && !PathPrefix(`/auth`)
      kind: Rule
      services:
        - name: frontend
          port: 80
    # Backend API
    - match: Host(`sentio.syslabs.dev`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 8080
      middlewares:
        - name: strip-api-prefix
    # Keycloak authentication
    - match: Host(`sentio.syslabs.dev`) && PathPrefix(`/auth`)
      kind: Rule
      services:
        - name: keycloak
          port: 8080
      middlewares:
        - name: strip-auth-prefix
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: sentio-systems
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth-prefix
  namespace: sentio-systems
spec:
  stripPrefix:
    prefixes:
      - /auth
