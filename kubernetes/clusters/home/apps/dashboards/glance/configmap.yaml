apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: dashboards
data:
  glance.yml: |
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: calendar

          - size: full
            widgets:
              - type: rss
                limit: 10
                collapse-after: 3
                cache: 3h
                feeds:
                  - url: https://ciechanow.ski/atom.xml
                    title: Bartosz Ciechanowski
                  - url: https://www.joshwcomeau.com/rss.xml
                    title: Josh Comeau
                  - url: https://samwho.dev/rss.xml
                    title: Sam Rose

          - size: small
            widgets:
              - type: weather
                location: New York, United States

              - type: markets
                markets:
                  - symbol: SPY
                    name: S&P 500
                  - symbol: BTC-USD
                    name: Bitcoin

      - name: Services
        columns:
          - size: full
            widgets:
              - type: monitor
                cache: 1m
                title: Homelab Services
                sites:
                  - title: Traefik
                    url: https://traefik.syslabs.dev
                    icon: si:traefik
                  - title: Grafana
                    url: https://grafana.syslabs.dev
                    icon: si:grafana
                  - title: Longhorn
                    url: https://longhorn.syslabs.dev
                    icon: mdi:harddisk
