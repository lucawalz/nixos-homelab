apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: dashboards
data:
  glance.yml: |
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: calendar
                first-day-of-week: monday

              - type: rss
                limit: 10
                collapse-after: 3
                cache: 3h
                feeds:
                  - url: https://www.heise.de/developer/rss/news-atom.xml
                    title: Heise Developer
                  - url: https://blog.jetbrains.com/idea/feed/
                    title: IntelliJ IDEA Blog
                  - url: https://aws.amazon.com/blogs/aws/feed/
                    title: AWS News
                  - url: https://kubernetes.io/feed.xml
                    title: Kubernetes Blog
                  - url: https://blog.golang.org/feed.atom
                    title: Go Blog

              - type: twitch-channels
                channels:
                  - ThePrimeagen
                  - teej_dv
                  - rwxrob
                  - TsodingDaily

          - size: full
            widgets:
              - type: group
                widgets:
                  - type: hacker-news
                  - type: lobsters

              - type: videos
                channels:
                  - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
                  - UCsBjURrPoezykLs9EqgamOA # Fireship
                  - UCsBjURrPoezykLs9EqgamOA # Fireship
                  - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
                  - UCnUYZLuoy1rq1aVMwx4aTzw # Computerphile
                  - UC8butISFwT-Wl7EV0hUK0BQ # freeCodeCamp
                  - UCkw4JCwteGrDHIsyIIKo4tQ # NetworkChuck
                  - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
                  - UC2eYFnH61tmytImy1mTYvhA # Luke Smith
                  - UCVls1GmFKf6WlTraIb_IaJg # DistroTube

              - type: group
                widgets:
                  - type: reddit
                    subreddit: technology
                    show-thumbnails: true
                  - type: reddit
                    subreddit: science
                    show-thumbnails: true

          - size: small
            widgets:
              - type: weather
                location: Stuttgart, Germany
                units: metric
                hour-format: 24h

              - type: releases
                repositories:
                  - lucawalz/nixos-homelab
                  - glanceapp/glance
                limit: 10
                collapse-after: 5

              - type: markets
                markets:
                  - symbol: BTC-USD
                    name: Bitcoin
                  - symbol: AMD
                    name: AMD
                  - symbol: NVDA
                    name: NVIDIA
                  - symbol: GOOGL
                    name: Google
                  - symbol: MSFT
                    name: Microsoft
                  - symbol: AAPL
                    name: Apple

      - name: Markets
        columns:
          - size: small
            widgets:
              - type: markets
                title: Indices
                markets:
                  - symbol: SPY
                    name: S&P 500
                  - symbol: DX-Y.NYB
                    name: Dollar Index

              - type: markets
                title: Crypto
                markets:
                  - symbol: BTC-USD
                    name: Bitcoin
                  - symbol: ETH-USD
                    name: Ethereum

              - type: markets
                title: Tech Stocks
                sort-by: absolute-change
                markets:
                  - symbol: NVDA
                    name: NVIDIA
                  - symbol: AMD
                    name: AMD
                  - symbol: INTC
                    name: Intel
                  - symbol: AAPL
                    name: Apple
                  - symbol: MSFT
                    name: Microsoft
                  - symbol: GOOGL
                    name: Google
                  - symbol: META
                    name: Meta
                  - symbol: AMZN
                    name: Amazon
                  - symbol: IBM
                    name: IBM
                  - symbol: ORCL
                    name: Oracle

          - size: full
            widgets:
              - type: rss
                title: Tech News
                style: horizontal-cards
                feeds:
                  - url: https://www.heise.de/developer/rss/news-atom.xml
                    title: Heise Developer
                  - url: https://techcrunch.com/feed/
                    title: TechCrunch
                  - url: https://www.theverge.com/rss/index.xml
                    title: The Verge

              - type: group
                widgets:
                  - type: reddit
                    show-thumbnails: true
                    subreddit: technology
                  - type: reddit
                    show-thumbnails: true
                    subreddit: programming

              - type: videos
                style: grid-cards
                collapse-after-rows: 3
                channels:
                  - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
                  - UCsBjURrPoezykLs9EqgamOA # Fireship

          - size: small
            widgets:
              - type: rss
                title: News
                limit: 30
                collapse-after: 13
                feeds:
                  - url: https://www.heise.de/developer/rss/news-atom.xml
                    title: Heise Developer

      - name: Gaming
        columns:
          - size: small
            widgets:
              - type: twitch-top-games
                limit: 20
                collapse-after: 13
                exclude:
                  - just-chatting
                  - pools-hot-tubs-and-beaches
                  - music
                  - art
                  - asmr

          - size: full
            widgets:
              - type: group
                widgets:
                  - type: reddit
                    show-thumbnails: true
                    subreddit: pcgaming
                  - type: reddit
                    subreddit: games

              - type: videos
                style: grid-cards
                collapse-after-rows: 3
                channels:
                  - UCNvzD7Z-g64bPXxGzaQaa4g # gameranx
                  - UCZ7AeeVbyslLM_8-nVy2B8Q # Skill Up
                  - UCHDxYLv8iovIbhrfl16CNyg # GameLinked
                  - UC9PBzalIcEQCsiIkq36PyUA # Digital Foundry

          - size: small
            widgets:
              - type: reddit
                subreddit: gamingnews
                limit: 7
                style: vertical-cards

      - name: Homelab
        columns:
          - size: small
            widgets:
              - type: rss
                limit: 15
                collapse-after: 5
                cache: 3h
                feeds:
                  - url: https://www.reddit.com/r/homelab/.rss
                    title: r/homelab
                  - url: https://www.reddit.com/r/selfhosted/.rss
                    title: r/selfhosted
                  - url: https://www.reddit.com/r/kubernetes/.rss
                    title: r/kubernetes

          - size: full
            widgets:
              - type: group
                widgets:
                  - type: reddit
                    subreddit: homelab
                    show-thumbnails: true
                  - type: reddit
                    subreddit: HomeNetworking
                    show-thumbnails: true

              - type: group
                widgets:
                  - type: reddit
                    subreddit: selfhosted
                    show-thumbnails: true
                  - type: reddit
                    subreddit: kubernetes
                    show-thumbnails: true

              - type: group
                widgets:
                  - type: reddit
                    subreddit: IOT
                    show-thumbnails: true
                  - type: reddit
                    subreddit: java
                    show-thumbnails: true

              - type: monitor
                cache: 1m
                title: Homelab Services
                sites:
                  - title: Traefik
                    url: https://traefik.syslabs.dev
                    icon: si:traefik
                  - title: Grafana
                    url: https://grafana.syslabs.dev
                    icon: si:grafana
                  - title: Longhorn
                    url: https://longhorn.syslabs.dev
                    icon: mdi:harddisk

          - size: small
            widgets:
              - type: releases
                repositories:
                  - lucawalz/nixos-homelab
                  - kubernetes/kubernetes
                  - go-gitea/gitea
                  - immich-app/immich
                  - syncthing/syncthing
                  - traefik/traefik
                  - grafana/grafana
                limit: 15
                collapse-after: 8