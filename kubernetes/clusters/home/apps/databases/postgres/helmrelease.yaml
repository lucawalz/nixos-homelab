apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: postgres
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      sourceRef:
        kind: OCIRepository
        name: postgresql
        namespace: flux-system
  values:
    # Auth will be configured with existingSecret after initial deployment
    primary:
      persistence:
        enabled: true
        size: 8Gi
  install:
    createNamespace: false
  upgrade:
    remediation:
      retries: 3
