apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: it-tools
  namespace: it-tools
spec:
  interval: 30m
  chart:
    spec:
      chart: it-tools
      version: "0.0.x"
      sourceRef:
        kind: HelmRepository
        name: it-tools
        namespace: flux-system
  values:
    ingress:
      enabled: false
