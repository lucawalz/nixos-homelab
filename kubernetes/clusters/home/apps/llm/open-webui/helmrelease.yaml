apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: llm
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: open-webui
      version: "14.8.x"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
  values:
    fullnameOverride: open-webui
    replicaCount: 1
    ollama:
      enabled: false
    ollamaUrls:
      - http://ollama.llm.svc.cluster.local:11434
    pipelines:
      enabled: false
    websocket:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
      accessModes:
        - ReadWriteOnce
    ingress:
      enabled: false
    service:
      type: ClusterIP
      port: 80
