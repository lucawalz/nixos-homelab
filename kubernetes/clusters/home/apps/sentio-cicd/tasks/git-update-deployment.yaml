apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-update-deployment
  namespace: sentio-cicd
spec:
  workspaces:
    - name: source
      description: The git repo
  params:
    - name: deployment_path
      description: Path to the deployment.yaml file
    - name: new_image
      description: The new image reference (e.g. repo/image:tag)
    - name: git_user_name
      default: "Tekton Bot"
    - name: git_user_email
      default: "tekton@syslabs.dev"
  steps:
    - name: update-yaml
      image: mikefarah/yq:4
      script: |
        # Update the image in the deployment file
        # Assumes standard Deployment structure: spec.template.spec.containers[0].image
        # We use a safer approach finding the container by name if possible, but for now simple replacement
        
        cd $(workspaces.source.path)
        
        # Simple sed replacement for now as it's robust enough for this specific file structure
        # and yq can sometimes be tricky with formatting preservation
        sed -i "s|image: .*|image: $(params.new_image)|g" $(params.deployment_path)
        
        cat $(params.deployment_path)
    - name: git-commit-push
      image: alpine/git
      script: |
        cd $(workspaces.source.path)
        git config user.email "$(params.git_user_email)"
        git config user.name "$(params.git_user_name)"
        
        git add $(params.deployment_path)
        git commit -m "chore(cicd): update image to $(params.new_image)"
        git push origin main
