apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-keycloak
  namespace: sentio-prod
  labels:
    app: sentio-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-keycloak
  template:
    metadata:
      labels:
        app: sentio-keycloak
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev"]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://sentio-postgresql.sentio-prod.svc.cluster.local:5432/sentio"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_PROXY
              value: "edge"
            - name: KC_HOSTNAME
              value: "sentio.syslabs.dev"
            - name: KC_HOSTNAME_PATH
              value: "/auth"
            - name: KC_HOSTNAME_ADMIN_URL
              value: "https://sentio.syslabs.dev/auth"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
