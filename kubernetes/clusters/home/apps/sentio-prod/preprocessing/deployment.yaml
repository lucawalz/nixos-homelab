apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-preprocessing
  namespace: sentio-prod
  labels:
    app: sentio-preprocessing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-preprocessing
  template:
    metadata:
      labels:
        app: sentio-preprocessing
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: preprocessing
          image: ghcr.io/lucawalz/sentio-systems/preprocessing-service:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: shared-images
              mountPath: /app/shared_images
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: sentio-shared-images
