apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-birder-ai
  namespace: sentio-staging
  labels:
    app: sentio-birder-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-birder-ai
  template:
    metadata:
      labels:
        app: sentio-birder-ai
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: birder-ai
          image: ghcr.io/lucawalz/sentio-systems/birder-ai:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: shared-images
              mountPath: /app/shared_images
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: sentio-shared-images
