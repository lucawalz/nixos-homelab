apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sentio-ingress
  namespace: sentio-staging
spec:
  entryPoints:
    - websecure
  tls:
    secretName: sentio-staging-tls
    certResolver: letsencrypt-prod
  routes:
    # Frontend (Root)
    - match: Host(`staging-sentio.syslabs.dev`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: sentio-frontend
          port: 80

    # Backend API
    - match: Host(`staging-sentio.syslabs.dev`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
          namespace: sentio-staging
      services:
        - name: sentio-backend
          port: 8080

    # Keycloak
    - match: Host(`staging-sentio.syslabs.dev`) && PathPrefix(`/auth`)
      kind: Rule
      middlewares:
        - name: strip-auth-prefix
          namespace: sentio-staging
      services:
        - name: keycloak
          port: 8080

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: sentio-staging
spec:
  stripPrefix:
    prefixes:
      - /api

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-auth-prefix
  namespace: sentio-staging
spec:
  stripPrefix:
    prefixes:
      - /auth
