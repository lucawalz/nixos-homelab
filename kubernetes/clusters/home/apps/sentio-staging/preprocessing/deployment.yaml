apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-preprocessing
  namespace: sentio-staging
  labels:
    app: sentio-preprocessing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-preprocessing
  template:
    metadata:
      labels:
        app: sentio-preprocessing
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: preprocessing
          image: ghcr.io/lucawalz/sentio-systems/preprocessing-service:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: shared-images
              mountPath: /app/shared_images
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: sentio-shared-images
