apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: sentio-birder
  namespace: sentio-systems
spec:
  image: ghcr.io/lucawalz/sentio-systems/birder-ai
  interval: 1m0s
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: sentio-birder
  namespace: sentio-systems
spec:
  imageRepositoryRef:
    name: sentio-birder
  policy:
    semver:
      range: '>=0.0.0'  # Matches stable releases only (from main branch)
