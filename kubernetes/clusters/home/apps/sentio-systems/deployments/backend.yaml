apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-backend
  namespace: sentio-systems
  labels:
    app: sentio-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-backend
  template:
    metadata:
      labels:
        app: sentio-backend
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z keycloak 8080; do echo waiting for keycloak; sleep 5; done;']
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-postgresql.postgres.svc.cluster.local 5432; do echo waiting for postgres; sleep 5; done;']
      containers:
        - name: backend
          image: ghcr.io/lucawalz/sentio-systems/sentio-backend:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sentio-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentio-secrets
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
          volumeMounts:
            - name: shared-images
              mountPath: /app/shared_images
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: sentio-shared-images
