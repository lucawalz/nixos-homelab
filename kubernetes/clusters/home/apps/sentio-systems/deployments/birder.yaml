apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-birder
  namespace: sentio-systems
  labels:
    app: sentio-birder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-birder
  template:
    metadata:
      labels:
        app: sentio-birder
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: birder
          image: ghcr.io/lucawalz/sentio-systems/birder-ai:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: BIRDER_PORT
              value: "8000"
          volumeMounts:
            - name: ai-models
              mountPath: /app/models
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: ai-models
          persistentVolumeClaim:
            claimName: sentio-ai-models
