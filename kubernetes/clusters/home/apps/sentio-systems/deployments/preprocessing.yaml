apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-preprocessing
  namespace: sentio-systems
  labels:
    app: sentio-preprocessing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-preprocessing
  template:
    metadata:
      labels:
        app: sentio-preprocessing
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: preprocessing
          image: ghcr.io/lucawalz/sentio-systems/preprocessing-service:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: PREPROCESSING_PORT
              value: "8082"
            - name: BIRDER_SERVICE_URL
              value: "http://birder:8000"
            - name: SPECIESNET_SERVICE_URL
              value: "http://speciesnet:8081"
            - name: BIRD_CLASSIFIER_URL
              value: "http://birder:8000/detect"
            - name: SPECIES_CLASSIFIER_URL
              value: "http://speciesnet:8081/detect"
          volumeMounts:
            - name: shared-images
              mountPath: /app/enhanced_images
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: sentio-shared-images
