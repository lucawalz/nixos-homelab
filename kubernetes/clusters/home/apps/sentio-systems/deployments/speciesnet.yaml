apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentio-speciesnet
  namespace: sentio-systems
  labels:
    app: sentio-speciesnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentio-speciesnet
  template:
    metadata:
      labels:
        app: sentio-speciesnet
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: speciesnet
          image: ghcr.io/lucawalz/sentio-systems/speciesnet-ai:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPECIESNET_PORT
              value: "8081"
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
