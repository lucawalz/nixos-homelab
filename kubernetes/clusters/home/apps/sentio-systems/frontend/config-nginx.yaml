apiVersion: v1
kind: ConfigMap
metadata:
  name: sentio-frontend-nginx
  namespace: sentio-systems
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;
    
        # Support for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }
    
        # Note: /api proxy is REMOVED because Traefik Ingress handles routing to backend
        # Note: API calls from frontend now use relative path /api which Traefik routes
    
        # Cache control for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    }
