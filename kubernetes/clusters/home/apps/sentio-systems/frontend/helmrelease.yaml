apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-frontend
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        pod:
          imagePullSecrets:
            - name: ghcr-auth
        containers:
          main:
            image:
              repository: ghcr.io/lucawalz/sentio-systems/sentio-web
              tag: 0.0.1-dev.1768872202 # {"$imagepolicy": "sentio-systems:sentio-frontend:tag"}
              pullPolicy: Always
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    persistence:
      config:
        enabled: true
        type: configMap
        name: sentio-frontend-nginx
        globalMounts:
          - path: /etc/nginx/conf.d/default.conf
            subPath: default.conf
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
        hosts:
          - host: sentio.syslabs.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
