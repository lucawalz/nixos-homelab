apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-frontend
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        
        pod:
          imagePullSecrets:
            - name: ghcr-auth
        
        containers:
          main:
            image:
              pullPolicy: Always
            
            # Runtime patch: Fix Nginx upstream for Kubernetes (backend -> sentio-backend)
            command: ["/bin/sh", "-c"]
            args:
              - |
                if [ -f /etc/nginx/conf.d/default.conf ]; then
                  sed -i 's/remote_addr;/remote_addr; resolver 10.43.0.10 valid=30s;/g' /etc/nginx/conf.d/default.conf && \
                  sed -i 's/upstream backend/upstream sentio-backend/g' /etc/nginx/conf.d/default.conf || true && \
                  sed -i 's|http://backend:8080|http://sentio-backend:8080|g' /etc/nginx/conf.d/default.conf
                fi && \
                nginx -g 'daemon off;'
            
            env:
              VITE_API_BASE_URL: "/api"
            
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
            
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"
    
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
        hosts:
          - host: sentio.syslabs.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
