apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-frontend
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        
        containers:
          main:
            image:
              repository: ghcr.io/lucawalz/sentio-systems/sentio-web
              tag: develop # {"$imagepolicy": "sentio-systems:sentio-frontend:tag"}
              pullPolicy: Always
            
            # Runtime patch to fix baked-in localhost:8083 URL
            command: ["/bin/sh", "-c"]
            args:
              - |
                find /usr/share/nginx/html -type f -name '*.js' -exec sed -i 's|http://localhost:8083|/api|g' {} + && \
                nginx -g 'daemon off;'
            
            env:
              VITE_API_BASE_URL: "/api"
            
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
            
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"
    
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: sentio.syslabs.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
