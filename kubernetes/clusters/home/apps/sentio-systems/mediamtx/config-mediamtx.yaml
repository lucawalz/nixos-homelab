apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: sentio-systems
data:
  mediamtx.yml: |
    # MediaMTX Configuration for Sentio Systems (Production)

    logLevel: info
    logDestinations: [stdout]

    # Connection resilience - tolerate brief network interruptions
    readTimeout: 60s
    writeTimeout: 60s
    readBufferCount: 2048

    # RTMPS server (TLS-encrypted) - receives streams from devices
    rtmp: yes
    rtmpAddress: :1935
    rtmpEncryption: strict
    rtmpsAddress: :443
    rtmpServerKey: /tls/tls.key
    rtmpServerCert: /tls/tls.crt

    # HLS server - serves streams to browsers
    hls: yes
    hlsAddress: :8888
    hlsEncryption: false
    hlsAlwaysRemux: yes
    hlsVariant: mpegts
    hlsSegmentCount: 6
    hlsSegmentDuration: 2s
    hlsPartDuration: 500ms
    hlsSegmentMaxSize: 50M
    hlsAllowOrigin: '*'

    # Auth webhook to backend
    authMethod: http
    authHTTPAddress: http://sentio-backend:8080/api/stream/auth

    # Path configuration - auth enforced by HTTP webhook
    paths:
      all:
