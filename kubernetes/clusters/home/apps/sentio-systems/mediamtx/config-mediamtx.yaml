apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: sentio-systems
data:
  mediamtx.yml: |
    # MediaMTX Configuration for Sentio Systems (Production)

    logLevel: info
    logDestinations: [stdout]

    # RTMPS server (TLS-encrypted) - receives streams from devices
    rtmp: yes
    rtmpAddress: :1935
    rtmpEncryption: strict
    rtmpsAddress: :1936
    rtmpServerKey: /tls/tls.key
    rtmpServerCert: /tls/tls.crt

    # WebRTC server - sub-second latency streaming via WHEP
    # Uses ICE-TCP because UDP is blocked by Cloudflare tunnel
    webrtc: yes
    webrtcAddress: :8889
    webrtcEncryption: no
    webrtcAllowOrigin: '*'

    # ICE configuration - trying STUN + TCP fallback
    webrtcICEServers2:
      - url: stun:stun.l.google.com:19302
    webrtcLocalUDPAddress: ""
    webrtcLocalTCPAddress: :8189


    # Auth webhook to backend
    authMethod: http
    authHTTPAddress: http://sentio-backend:8080/api/stream/auth

    # Path configuration - auth enforced by HTTP webhook
    paths:
      all:
