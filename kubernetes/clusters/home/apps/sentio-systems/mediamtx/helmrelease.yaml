apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-mediamtx
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate

        containers:
          main:
            image:
              repository: bluenviron/mediamtx
              tag: "1.11.3-ffmpeg"
              pullPolicy: IfNotPresent

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8889
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8889
                  initialDelaySeconds: 5
                  periodSeconds: 10

            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "1000m"

    service:
      main:
        controller: main
        ports:
          rtmps:
            port: 1936
            protocol: TCP
          webrtc:
            port: 8889
            protocol: TCP
          webrtc-ice:
            port: 8189
            protocol: TCP

    ingress:
      main:
        enabled: true
        className: traefik
        hosts:
          - host: media.syslabs.dev
            paths:
              # WebRTC/WHEP playback
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: webrtc

      # RTMPS ingress for device stream push (TLS-encrypted)
      rtmps:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: rtmps
        hosts:
          - host: media.syslabs.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: rtmps

    persistence:
      config:
        enabled: true
        type: configMap
        name: mediamtx-config
        globalMounts:
          - path: /mediamtx.yml
            subPath: mediamtx.yml
      tls:
        enabled: true
        type: secret
        name: mediamtx-tls
        globalMounts:
          - path: /tls
