apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mediamtx-rtmps
  namespace: sentio-systems
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`stream.syslabs.dev`)
      services:
        - name: sentio-mediamtx
          port: 443
  tls:
    passthrough: true
