apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-mosquitto
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate

        containers:
          main:
            image:
              repository: eclipse-mosquitto
              tag: "2.0"
              pullPolicy: IfNotPresent

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 1883
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 1883
                  initialDelaySeconds: 5
                  periodSeconds: 10

            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"

    service:
      main:
        controller: main
        ports:
          mqtt:
            port: 1883
            protocol: TCP
          websocket:
            port: 9001
            protocol: TCP

    ingress:
      websocket:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - host: mqtt.syslabs.dev
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: websocket

    persistence:
      config:
        enabled: true
        type: configMap
        name: mosquitto-config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf

      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: sentio-mosquitto-data
        globalMounts:
          - path: /mosquitto/data
