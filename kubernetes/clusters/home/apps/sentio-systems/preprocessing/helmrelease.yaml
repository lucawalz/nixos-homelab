apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-preprocessing
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        pod:
          imagePullSecrets:
            - name: ghcr-auth
        containers:
          main:
            image:
              repository: ghcr.io/lucawalz/sentio-systems/preprocessing-service
              tag: 0.0.1-dev.1768133541 # {"$imagepolicy": "sentio-systems:sentio-preprocessing:tag"}
              pullPolicy: Always
            env:
              PREPROCESSING_PORT: "8082"
              BIRDER_SERVICE_URL: "http://birder:8000"
              SPECIESNET_SERVICE_URL: "http://speciesnet:8000"
              BIRD_CLASSIFIER_URL: "http://birder:8000/detect"
              SPECIES_CLASSIFIER_URL: "http://speciesnet:8000/detect"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8082
                  initialDelaySeconds: 60
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8082
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
    service:
      main:
        controller: main
        ports:
          http:
            port: 8082
    persistence:
      shared-images:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: sentio-shared-images
        globalMounts:
          - path: /app/enhanced_images
