apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: sentio-preprocessing
  namespace: sentio-systems
spec:
  image: ghcr.io/lucawalz/sentio-systems/preprocessing-service
  interval: 1m0s
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: sentio-preprocessing
  namespace: sentio-systems
spec:
  imageRepositoryRef:
    name: sentio-preprocessing
  policy:
    alphabetical:
      order: desc
  filterTags:
    pattern: '^develop-[a-f0-9]+$'
