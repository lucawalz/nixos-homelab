apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentio-speciesnet
  namespace: sentio-systems
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    timeout: 10m
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        pod:
          imagePullSecrets:
            - name: ghcr-auth
        containers:
          main:
            image:
              repository: ghcr.io/lucawalz/sentio-systems/speciesnet-ai
              tag: 0.5.0-dev.1772247161 # {"$imagepolicy": "sentio-systems:sentio-speciesnet:tag"}
              pullPolicy: Always
            env:
              SPECIESNET_PORT: "8000"
              REDIS_HOST: "sentio-redis"
              REDIS_PORT: "6379"
              # Queue bridge and ARQ worker modes
              BRIDGE_MODE: "true"
              WORKER_MODE: "true"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8081
                  initialDelaySeconds: 120
                  periodSeconds: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8081
                  initialDelaySeconds: 60
                  periodSeconds: 30
            resources:
              requests:
                memory: "1Gi"
                cpu: "200m"
              limits:
                memory: "4Gi"
                cpu: "1000m"
    service:
      main:
        controller: main
        ports:
          http:
            port: 8081
