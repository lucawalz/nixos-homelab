---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-metallb
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/clusters/home/infrastructure/networking/metallb/config
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-infrastructure
    - name: cluster-namespaces
