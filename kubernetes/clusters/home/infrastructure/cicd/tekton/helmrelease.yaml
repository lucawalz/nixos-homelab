apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-pipelines
  namespace: tekton-pipelines
spec:
  interval: 30m
  chart:
    spec:
      chart: tekton-pipeline
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: tekton
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: tekton-values
      optional: true
  values:
    controller:
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
