apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |
    # kube-prometheus-stack Helm values
    # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

    # Reduce resource usage for homelab
    prometheus:
      prometheusSpec:
        retention: 7d  # Keep metrics for 7 days
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

    grafana:
      enabled: true
      adminUser: admin
      adminPassword: admin  # Change this or use secret!
      
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: longhorn

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    # Disable alertmanager if not needed (reduces resources)
    alertmanager:
      enabled: false