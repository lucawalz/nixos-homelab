apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |
    # kube-prometheus-stack Helm values
    # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

    # Reduce resource usage for homelab
    prometheus:
      prometheusSpec:
        retention: 7d  # Keep metrics for 7 days
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

    grafana:
      enabled: true
      adminUser: admin
      adminPassword: admin  # Change this or use secret!
      
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: longhorn

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    alertmanager:
      enabled: true
      alertmanagerSpec:
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        secrets:
          - vigil-webhook-secret
      config:
        global:
          resolve_timeout: 5m
        route:
          receiver: 'vigil-webhook'
          group_by: ['alertname']
          group_wait: 10s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: 'null'
              matchers:
                - alertname =~ "InfoInhibitor|Watchdog"
        receivers:
          - name: 'null'
          - name: 'vigil-webhook'
            webhook_configs:
              - url: 'https://vigil.syslabs.dev/webhook'
                send_resolved: true
                http_config:
                  authorization:
                    type: Bearer
                    credentials_file: /etc/alertmanager/secrets/vigil-webhook-secret/token
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity =~ warning|info
            equal:
              - namespace
              - alertname