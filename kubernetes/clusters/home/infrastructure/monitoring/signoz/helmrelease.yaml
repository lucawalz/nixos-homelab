apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: signoz
  namespace: signoz
spec:
  interval: 30m
  timeout: 1h
  chart:
    spec:
      chart: signoz
      version: "0.103.0"
      sourceRef:
        kind: HelmRepository
        name: signoz
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: signoz-values
      optional: false
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
