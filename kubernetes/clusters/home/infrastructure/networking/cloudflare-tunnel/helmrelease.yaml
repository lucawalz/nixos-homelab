apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      cloudflared:
        replicas: 2
        containers:
          app:
            image:
              repository: cloudflare/cloudflared
              tag: latest
            args:
              - tunnel
              - run
              - --token
              - $(TUNNEL_TOKEN)
            env:
              TUNNEL_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: cloudflare-tunnel-secret
                    key: tunnel-token
              TUNNEL_ORIGIN_ENABLE_HTTP2:
                value: "true"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
