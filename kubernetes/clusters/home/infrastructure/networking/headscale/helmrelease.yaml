apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headscale
  namespace: headscale
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      headscale:
        containers:
          app:
            image:
              repository: ghcr.io/juanfont/headscale
              tag: latest
            args:
              - serve
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
    service:
      app:
        controller: headscale
        ports:
          http:
            port: 8080
          grpc:
            port: 50443
      nodeport:
        controller: headscale
        type: NodePort
        ports:
          http:
            port: 8080
            nodePort: 30800
            protocol: TCP
    configMaps:
      config:
        data:
          config.yaml: |
            server_url: https://headscale.syslabs.dev
            listen_addr: 0.0.0.0:8080
            metrics_listen_addr: 127.0.0.1:9090
            grpc_listen_addr: 0.0.0.0:50443
            grpc_allow_insecure: true
            private_key_path: /var/lib/headscale/private.key
            noise:
              private_key_path: /var/lib/headscale/noise_private.key
            prefixes:
              v4: 100.64.0.0/10
              v6: fd7a:115c:a1e0::/48
            database:
              type: sqlite3
              sqlite:
                path: /var/lib/headscale/db.sqlite
            derp:
              urls:
                - https://controlplane.tailscale.com/derpmap/default
              auto_update_enabled: true
              update_frequency: 24h
              server:
                enabled: false
            log:
              level: info
            dns:
              magic_dns: true
              base_domain: vpn.syslabs.dev
              nameservers:
                global:
                  - 1.1.1.1
              override_local_dns: false
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /var/lib/headscale
      config:
        type: configMap
        name: headscale-config
        globalMounts:
          - path: /etc/headscale
