apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
  namespace: netbird
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: netbird
      version: "1.2.0"
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: flux-system
  values:
    global:
      domain:
        global: netbird.homelab.internal
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
