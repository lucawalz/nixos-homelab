apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`netbird.syslabs.dev`) && (PathPrefix(`/management.ManagementService`) || PathPrefix(`/signalexchange.SignalExchange`) || PathPrefix(`/relay`))
      kind: Rule
      priority: 20
      services:
        - name: netbird-server
          port: 80
          scheme: h2c
    - match: Host(`netbird.syslabs.dev`) && (PathPrefix(`/api`) || PathPrefix(`/oauth2`))
      kind: Rule
      priority: 10
      services:
        - name: netbird-server
          port: 80
    - match: Host(`netbird.syslabs.dev`)
      kind: Rule
      priority: 1
      services:
        - name: netbird-dashboard
          port: 80
