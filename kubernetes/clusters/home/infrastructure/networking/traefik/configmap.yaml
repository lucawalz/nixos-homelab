apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-values
  namespace: traefik
data:
  values.yaml: |
    # Traefik Helm values
    # See: https://github.com/traefik/traefik-helm-chart

    deployment:
      replicas: 1

    # Service configuration
    service:
      type: NodePort
      nodePorts:
        web: 30080
        websecure: 30443

    ports:
      web:
        port: 80
        expose: true
      websecure:
        port: 443
        expose: true

    # Enable dashboard
    api:
      dashboard: true
      insecure: false

    # Resource requests/limits
    resources:
      requests:
        cpu: "100m"
        memory: "50Mi"
      limits:
        cpu: "300m"
        memory: "150Mi"