apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: traefik
      version: "28.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: NodePort
    ports:
      web:
        nodePort: 30080
      websecure:
        nodePort: 30443
      rtmps:
        port: 1936
        expose: true
        exposedPort: 1936
        protocol: TCP
        nodePort: 31936
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
