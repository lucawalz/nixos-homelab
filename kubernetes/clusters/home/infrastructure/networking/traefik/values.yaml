# Traefik Helm values
# See: https://github.com/traefik/traefik-helm-chart

deployment:
  replicas: 1

ports:
  web:
    port: 80
    expose: true
  websecure:
    port: 443
    expose: true

# Enable dashboard
api:
  dashboard: true
  insecure: true

# Resource requests/limits
resources:
  requests:
    cpu: "100m"
    memory: "50Mi"
  limits:
    cpu: "300m"
    memory: "150Mi"

