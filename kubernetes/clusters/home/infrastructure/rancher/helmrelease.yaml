apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: rancher
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: rancher
      version: "2.13.x"
      sourceRef:
        kind: HelmRepository
        name: rancher
        namespace: flux-system
  values:
    # Disable ingress in Helm chart as we'll manage it separately with Traefik
    ingress:
      enabled: false
    
    # TLS will be handled by our own certificate
    tls: external
    
    # Configure hostname
    hostname: rancher.syslabs.dev
    
    # Resource limits
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    
    # Audit log settings
    auditLog:
      destination: sidecar
      maxAge: 30
      maxBackup: 10
      maxSize: 100
    
    # Replica count
    replicas: 1
    
    # Configure admin user from existing secret
    bootstrapPassword: ""
    useExistingSecret: rancher-admin-secret
    existingSecretKey: password
    
  install:
    createNamespace: false  # We create it separately
  upgrade:
    remediation:
      retries: 3