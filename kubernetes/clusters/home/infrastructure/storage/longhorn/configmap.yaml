apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-values
  namespace: longhorn-system
data:
  values.yaml: |
    # Longhorn Helm values
    # See: https://github.com/longhorn/longhorn/blob/master/chart/values.yaml

    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn

    # Storage class configuration
    persistence:
      defaultClass: true