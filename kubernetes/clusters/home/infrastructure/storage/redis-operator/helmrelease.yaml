apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: redis-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: redis-operator
      version: "0.18.x"
      sourceRef:
        kind: HelmRepository
        name: redis-operator
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: redis-operator-values
      optional: true
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
