apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 1. Sources first (Helm repos)
  - sources
  
  # 2. Cluster config
  - config
  
  # 3. Infrastructure (storage → networking → monitoring)
  - infrastructure
  
  # 4. Applications (depends on infra)
  - apps
  
  # 5. Secrets (available to all)
  - secrets

