# GitRepository resource to connect FluxCD to your Git repository
# Update the spec.url to point to your actual repository
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-repo
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main  # or master, depending on your default branch
  url: https://github.com/lucawalz/nixos-homelab
  secretRef:
    name: git-credentials
---
# Kustomization resource to apply manifests from the repository
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./kubernetes/apps"  # Path to your applications
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-repo
  validation: client
---
# Kustomization for infrastructure components
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./kubernetes/infrastructure"
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-repo
  validation: client