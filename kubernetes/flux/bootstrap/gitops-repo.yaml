# GitRepository resource to connect FluxCD to your Git repository
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-repo
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  url: https://github.com/lucawalz/nixos-homelab
  secretRef:
    name: git-credentials
---
# Kustomization resource with SOPS decryption for applications
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./kubernetes/apps"
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-repo
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Kustomization for infrastructure components with SOPS decryption
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homelab-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  path: "./kubernetes/infrastructure"
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab-repo
  decryption:
    provider: sops
    secretRef:
      name: sops-age
