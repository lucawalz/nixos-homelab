apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret
  namespace: cert-manager
type: Opaque
data:
  api-token: ENC[AES256_GCM,data:your-encrypted-cloudflare-token,iv:...,tag:...,type:str]
# This should be encrypted with sops
# Run: sops -e -i kubernetes/infrastructure/cert-manager/cloudflare-secret.yaml