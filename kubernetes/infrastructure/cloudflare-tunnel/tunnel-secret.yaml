apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-secret
  namespace: cloudflare-tunnel
type: Opaque
data:
  tunnel-token: ENC[AES256_GCM,data:your-encrypted-tunnel-token,iv:...,tag:...,type:str]
# This should be encrypted with sops
# Run: sops -e -i kubernetes/infrastructure/cloudflare-tunnel/tunnel-secret.yaml