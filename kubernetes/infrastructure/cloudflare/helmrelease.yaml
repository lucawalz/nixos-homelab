apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflare
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudflared
      version: "0.1.2"  # Update to latest version
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: cloudflare
      interval: 12h
  values:
    # Cloudflared configuration
    cloudflared:
      # Use tunnel token from secret
      tunnel_token_secret: tunnel-credentials
      tunnel_token_key: TUNNEL_TOKEN
      
    # Deployment configuration
    replicaCount: 2
    
    # Image configuration
    image:
      repository: cloudflare/cloudflared
      tag: "2024.10.0"  # Update to latest version
      pullPolicy: IfNotPresent
    
    # Pod configuration
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "2000"
    
    # Resources
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    
    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    
    # Environment variables for tunnel token
    env:
      - name: TUNNEL_TOKEN
        valueFrom:
          secretKeyRef:
            name: tunnel-credentials
            key: TUNNEL_TOKEN
    
    # Command override to use tunnel token
    args:
      - tunnel
      - --metrics
      - 0.0.0.0:2000
      - run
    
    # Service for metrics
    service:
      enabled: true
      type: ClusterIP
      port: 2000
      targetPort: 2000
    
    # Liveness and readiness probes
    livenessProbe:
      httpGet:
        path: /ready
        port: 2000
      failureThreshold: 1
      initialDelaySeconds: 10
      periodSeconds: 10
    
    readinessProbe:
      httpGet:
        path: /ready
        port: 2000
      failureThreshold: 1
      initialDelaySeconds: 10
      periodSeconds: 10