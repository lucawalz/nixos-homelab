apiVersion: v1
kind: Secret
metadata:
  name: flux-system
  namespace: flux-system
type: Opaque
data:
  username: ENC[AES256_GCM,data:your-encrypted-username,iv:...,tag:...,type:str]
  password: ENC[AES256_GCM,data:your-encrypted-github-token,iv:...,tag:...,type:str]
# This should be encrypted with sops
# 1. Create the secret with your GitHub username and personal access token:
#    kubectl create secret generic flux-system \
#      --from-literal=username=your-github-username \
#      --from-literal=password=your-github-token \
#      --namespace=flux-system \
#      --dry-run=client -o yaml > kubernetes/infrastructure/flux-system/git-auth-secret.yaml
# 2. Then encrypt it:
#    sops -e -i kubernetes/infrastructure/flux-system/git-auth-secret.yaml