apiVersion: v1
kind: Secret
metadata:
  name: longhorn-auth
  namespace: longhorn-system
type: Opaque
data:
  users: ENC[AES256_GCM,data:your-encrypted-htpasswd,iv:...,tag:...,type:str]
# This should be encrypted with sops
# 1. Generate htpasswd: htpasswd -nb admin your-password
# 2. Create the secret:
#    kubectl create secret generic longhorn-auth \
#      --from-literal=users="admin:$2y$10$..." \
#      --namespace=longhorn-system \
#      --dry-run=client -o yaml > kubernetes/infrastructure/longhorn/auth-secret.yaml
# 3. Then encrypt it:
#    sops -e -i kubernetes/infrastructure/longhorn/auth-secret.yaml