apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  namespace: postgres
type: Opaque
data:
  postgres-password: ENC[AES256_GCM,data:your-encrypted-postgres-password,iv:...,tag:...,type:str]
  user-password: ENC[AES256_GCM,data:your-encrypted-user-password,iv:...,tag:...,type:str]
# This should be encrypted with sops
# 1. Create the secret:
#    kubectl create secret generic postgres-auth \
#      --from-literal=postgres-password="your-strong-postgres-password" \
#      --from-literal=user-password="your-strong-user-password" \
#      --namespace=postgres \
#      --dry-run=client -o yaml > kubernetes/infrastructure/postgres/auth-secret.yaml
# 2. Then encrypt it:
#    sops -e -i kubernetes/infrastructure/postgres/auth-secret.yaml