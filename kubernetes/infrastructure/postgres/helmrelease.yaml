apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: postgres
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "15.5.38"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: postgres
      interval: 12h
  values:
    image:
      tag: "15.8.0-debian-12-r7"
    auth:
      enablePostgresUser: true
      # existingSecret: postgres-auth  # Enable after creating encrypted secret
      # secretKeys:
      #   adminPasswordKey: postgres-password
      #   userPasswordKey: user-password
      postgresPassword: "changeme123" # Temporary - replace with proper secret
    primary:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 20Gi
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      podSecurityContext:
        enabled: true
        fsGroup: 1001
      containerSecurityContext:
        enabled: true
        runAsUser: 1001
        runAsNonRoot: true
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
    metrics:
      enabled: false
      image:
        tag: "0.15.0-debian-12-r29"
    networkPolicy:
      enabled: false
