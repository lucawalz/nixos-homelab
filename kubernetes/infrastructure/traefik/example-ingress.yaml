# Example of how services connect to Traefik internally
# All services route through: https://traefik.traefik.svc.cluster.local:443

# Method 1: Using Ingress (Recommended)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-app
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: app.syslabs.dev # Your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: your-app-service
                port:
                  number: 80
  tls:
    - hosts:
        - app.syslabs.dev
