apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "37.2.0" # Helm chart version
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 12h
  values:
    # Global configuration
    globalArguments:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"

    # Additional arguments
    additionalArguments:
      - "--serversTransport.insecureSkipVerify=true"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.kubernetescrd"
      - "--providers.kubernetesingress"
      - "--certificatesresolvers.letsencrypt.acme.email=lucawalz.business@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

    # Deployment configuration
    deployment:
      enabled: true
      replicas: 1 # ACME requires single replica
      podAnnotations:
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"

    # Ports configuration
    ports:
      web:
        port: 80
        expose:
          default: true
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 443
        expose:
          default: true
        exposedPort: 443
        protocol: TCP
        tls:
          enabled: true
      traefik:
        port: 8080
        expose:
          default: false
        protocol: TCP

    # Service configuration
    service:
      enabled: true
      type: ClusterIP # Internal cluster access only
      # External access via NodePort if needed
      # type: NodePort
      # nodePorts:
      #   web: 30080
      #   websecure: 30443

    # Persistence for ACME certificates
    persistence:
      enabled: true
      name: data
      accessMode: ReadWriteOnce
      size: 128Mi
      storageClass: "longhorn" # Use default storage class
      path: /data

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 50Mi
      limits:
        cpu: 300m
        memory: 150Mi

    # Security context
    securityContext:
      capabilities:
        drop: [ALL]
      readOnlyRootFilesystem: true
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532

    podSecurityContext:
      fsGroup: 65532
